name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip libssl-dev zlib1g-dev ccache
          pip install --upgrade buildozer Cython==0.29.36 setuptools
      - name: Build APK
        run: |
          rm -rf ~/.buildozer
          buildozer --debug android debug 2>&1 | tee build.log
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tupgaz-mobile-apk
          path: bin/*.apk
      - name: Upload log if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
