name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libssl-dev zlib1g-dev ccache unzip git
          pip install -q --upgrade buildozer Cython==0.29.36 setuptools virtualenv
      - name: Build APK
        timeout-minutes: 120
        run: |
          rm -rf ~/.buildozer
          buildozer android debug 2>&1 | tee build.log
      - name: Find APK
        run: |
          echo "=== bin/ içeriği ==="
          ls -laR bin/ 2>/dev/null || echo "bin/ yok"
          echo "=== APK ara ==="
          find / -name "*.apk" -type f 2>/dev/null | head -20
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            bin/*.apk
            build.log
            *.spec
          if-no-files-found: ignore
