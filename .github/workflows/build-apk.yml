name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip libssl-dev zlib1g-dev ccache unzip
          pip install -q --upgrade buildozer Cython==0.29.36 setuptools
      - name: Build APK
        run: |
          rm -rf ~/.buildozer
          buildozer -v android debug 2>&1 | tee build.log
      - name: Find APK
        run: |
          echo "=== Dosya yapısı ==="
          ls -la bin/ 2>/dev/null || echo "bin/ yok"
          find /home -name "*.apk" 2>/dev/null || true
          find /content -name "*.apk" 2>/dev/null || true
          echo "=== buildozer.spec ==="
          cat buildozer.spec
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tupgaz-mobile-apk
          path: |
            bin/*.apk
            /home/**/*.apk
      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
